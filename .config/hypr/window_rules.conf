windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = flameshot-root
    match:class = flameshot
    no_anim = true
    float = true
    move = 0 0
    pin = true
    no_initial_focus = true
}


windowrule {
    name = kitty-float
    match:class = kitty
    float = false
    size = 1200 600
}
